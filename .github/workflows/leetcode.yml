name: Update LeetCode SVG

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch stats
        run: |
          curl -s https://leetcode-stats-api.herokuapp.com/Mayank_Mohanty > data.json

      - name: Create SVG (simple)
        run: |
          solved=$(jq .totalSolved data.json)
          total=$(jq .totalQuestions data.json)

          echo "<svg xmlns='http://www.w3.org/2000/svg' width='300' height='100'>
          <text x='10' y='50' fill='white' font-size='20'>
          $solved / $total solved
          </text></svg>" > assets/leetcode.svg

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update svg" || exit 0
          git push
